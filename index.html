<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedant Badgujar</title>

<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
}

/* PARTICLES (FIXED) */
#particles {
  position: fixed;
  inset: 0;
  z-index: -10;
  pointer-events: none;
}

/* BREATHING GRADIENT */
.bg {
  position: fixed;
  inset: 0;
  z-index: -5;

  background:
    radial-gradient(circle at 20% 30%, rgba(255,208,0,0.4), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(255,122,0,0.3), transparent 60%);

  filter: blur(120px);
  animation: breathe 12s ease-in-out infinite alternate;
}

@keyframes breathe {
  0% { transform: scale(1); }
  100% { transform: scale(1.2) translate(30px, -30px); }
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
}

.logo {
  color: #ffd000;
  font-weight: bold;
}

.nav-links a {
  margin-left: 20px;
  color: #aaa;
  text-decoration: none;
}

.nav-links a:hover {
  color: #ffd000;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  padding-left: 10%;
}

.hero h1 {
  font-size: 5rem;
}

.hero span {
  display: block;
  font-size: 6.5rem;
  background: linear-gradient(90deg, #ffd000, #ff7a00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero button {
  margin-top: 20px;
  padding: 12px 25px;
  border: 1px solid #ffd000;
  background: transparent;
  color: #ffd000;
  cursor: pointer;
}

/* SECTIONS */
section {
  padding: 100px 10%;
  position: relative;
  z-index: 5;
}

h2 {
  color: #ffd000;
  margin-bottom: 30px;
}

/* PROJECTS */
.carousel {
  display: flex;
  gap: 20px;
  overflow-x: auto;
}

.card {
  min-width: 250px;
  padding: 15px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* CAREER */
.grid {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.box {
  padding: 20px;
  background: rgba(255,255,255,0.05);
}

/* CONTACT */
.contact-box {
  padding: 20px;
  background: rgba(255,255,255,0.05);
}

</style>
</head>

<body>

<!-- PARTICLES -->
<div id="particles"></div>

<!-- GRADIENT -->
<div class="bg"></div>

<!-- NAV -->
<nav>
  <div class="logo">VB</div>
  <div class="nav-links">
    <a href="#projects">Projects</a>
    <a href="#career">Career</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Vedant <span>Badgujar</span></h1>
    <button onclick="scrollToSection('projects')">View Projects ↓</button>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="carousel">
    <div class="card">
      <img src="images/mindmitra.png">
      <p>Mind Mitra</p>
    </div>

    <div class="card">
      <img src="images/sahaay.png">
      <p>Sahaay</p>
    </div>

    <div class="card">
      <img src="images/fascinating.png">
      <p>Fascinating Clothings</p>
    </div>

    <div class="card">
      <img src="images/raion.png">
      <p>Raion Clothings</p>
    </div>

    <div class="card">
      <img src="images/timetable.png">
      <p>Timetable</p>
    </div>
  </div>
</section>

<!-- CAREER -->
<section id="career">
  <h2>Career</h2>
  <div class="grid">
    <div class="box">10th - 89.60%</div>
    <div class="box">12th - 62.60%</div>
    <div class="box">Engineering - 9.35 CGPA</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <div class="contact-box">
    <p>Email: vedant9badgujar@gmail.com</p>
    <p>Phone: +91 8485031964</p>
    <br>
    <a href="https://github.com/CuratedChaos">GitHub</a>
    <a href="https://www.linkedin.com/in/vedant-badgujar-31aa74358">LinkedIn</a>
  </div>
</section>

<script>

// SCROLL
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: "smooth" });
}

// PARTICLES (SUBTLE NOW)
tsParticles.load("particles", {
  particles: {
    number: { value: 25 },
    color: { value: "#ffd000" },
    links: { enable: true, color: "#ff7a00", opacity: 0.2 },
    move: { enable: true, speed: 0.5 },
    size: { value: 2 },
    opacity: { value: 0.2 }
  }
});

</script>

</body>
</html>
